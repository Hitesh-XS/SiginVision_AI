<!DOCTYPE html>
<html>
<head>
    <title>SignVision AI - Sentence Mode</title>
    <style>
        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1150px;
            margin: auto;
            padding: 30px;
        }

        h1 {
            color: #a78bfa;
            margin-bottom: 20px;
        }

        .layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        .card {
            background: #1e293b;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.35);
        }

        video {
            width: 100%;
            border-radius: 16px;
            background: black;
        }

        canvas {
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: none;
            border-radius: 12px;
            background: #7c3aed;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #6d28d9;
        }

        .danger {
            background: #dc2626;
        }

        .success {
            background: #16a34a;
        }

        .warning {
            background: #f59e0b;
        }

        .result-box {
            text-align: center;
            background: #020617;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .gesture {
            font-size: 72px;
            font-weight: bold;
            color: #22c55e;
        }

        .unknown {
            color: #f97316;
        }

        .confidence {
            font-size: 22px;
            color: #facc15;
            margin-top: 10px;
        }

        .sentence-box {
            background: #020617;
            padding: 18px;
            border-radius: 14px;
            min-height: 80px;
            font-size: 32px;
            font-weight: bold;
            color: #38bdf8;
            word-break: break-word;
            margin-bottom: 14px;
        }

        .small {
            color: #94a3b8;
            margin-top: 8px;
            font-size: 14px;
        }

        .status {
            background: #020617;
            padding: 14px;
            border-radius: 12px;
            margin-top: 16px;
            color: #cbd5e1;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            padding: 10px 0;
        }

        .label {
            color: #94a3b8;
        }

        .value {
            font-weight: bold;
        }

        .ready {
            color: #22c55e;
        }

        .locked {
            color: #f97316;
        }

        @media (max-width: 850px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SignVision AI - Sentence Builder</h1>

    <div class="layout">
        <div class="card">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>

            <button onclick="startCamera()">Start Camera</button>
            <button onclick="predictOnce()" class="success">Predict Once</button>
            <button onclick="toggleLivePrediction()" id="liveBtn">Start Live Prediction</button>

            <div class="status" id="status">
                Status: Waiting...
            </div>
        </div>

        <div class="card">
            <div class="result-box">
                <div>Current Prediction</div>
                <div class="gesture" id="gesture">-</div>
                <div class="confidence" id="confidence">Confidence: -</div>
                <div class="small" id="rawGesture">Raw: -</div>
            </div>

            <h2>Sentence</h2>
            <div class="sentence-box" id="sentenceBox"></div>

            <button onclick="addSpace()" class="warning">Add Space</button>
            <button onclick="backspaceSentence()">Backspace</button>
            <button onclick="clearSentence()" class="danger">Clear Sentence</button>

            <div class="info-row">
                <span class="label">Append State</span>
                <span class="value ready" id="appendState">Ready</span>
            </div>

            <div class="info-row">
                <span class="label">Stable Count</span>
                <span class="value" id="stableCount">0</span>
            </div>

            <div class="info-row">
                <span class="label">Landmarks</span>
                <span class="value" id="landmarkCount">-</span>
            </div>

            <div class="info-row">
                <span class="label">Threshold</span>
                <span class="value" id="threshold">80%</span>
            </div>

            <p class="small">
                A sign is added only once. Remove your hand, then show the next sign.
            </p>
        </div>
    </div>
</div>

<script>
    let video = document.getElementById("video");
    let canvas = document.getElementById("canvas");

    let gestureBox = document.getElementById("gesture");
    let confidenceBox = document.getElementById("confidence");
    let rawGestureBox = document.getElementById("rawGesture");
    let statusBox = document.getElementById("status");
    let landmarkCountBox = document.getElementById("landmarkCount");
    let thresholdBox = document.getElementById("threshold");
    let liveBtn = document.getElementById("liveBtn");
    let sentenceBox = document.getElementById("sentenceBox");
    let appendStateBox = document.getElementById("appendState");
    let stableCountBox = document.getElementById("stableCount");

    let live = false;
    let liveTimer = null;
    let isPredicting = false;

    let sentence = "";

    let readyToAppend = true;
    let lastStableGesture = null;
    let currentCandidate = null;
    let stableCount = 0;

    let requiredStableFrames = 3;

    function getCSRFToken() {
        let cookieValue = null;
        let cookies = document.cookie.split(";");

        for (let cookie of cookies) {
            cookie = cookie.trim();

            if (cookie.startsWith("csrftoken=")) {
                cookieValue = cookie.substring("csrftoken=".length);
                break;
            }
        }

        return cookieValue;
    }

    function updateSentenceUI() {
        sentenceBox.innerHTML = sentence || "&nbsp;";
    }

    function updateAppendStateUI() {
        if (readyToAppend) {
            appendStateBox.innerHTML = "Ready";
            appendStateBox.classList.remove("locked");
            appendStateBox.classList.add("ready");
        } else {
            appendStateBox.innerHTML = "Locked until hand removed";
            appendStateBox.classList.remove("ready");
            appendStateBox.classList.add("locked");
        }

        stableCountBox.innerHTML = stableCount;
    }

    function addSpace() {
        if (sentence.length === 0) {
            return;
        }

        if (!sentence.endsWith(" ")) {
            sentence += " ";
            updateSentenceUI();
        }
    }

    function backspaceSentence() {
        sentence = sentence.slice(0, -1);
        updateSentenceUI();
    }

    function clearSentence() {
        sentence = "";
        readyToAppend = true;
        lastStableGesture = null;
        currentCandidate = null;
        stableCount = 0;

        updateSentenceUI();
        updateAppendStateUI();
    }

    function appendGestureOnce(gesture) {
        if (!readyToAppend) {
            return;
        }

        if (!gesture || gesture === "Unknown") {
            return;
        }

        sentence += gesture;
        lastStableGesture = gesture;
        readyToAppend = false;

        updateSentenceUI();
        updateAppendStateUI();
    }

    function handleNoHandDetected() {
        gestureBox.innerHTML = "-";
        confidenceBox.innerHTML = "Confidence: -";
        rawGestureBox.innerHTML = "Raw: -";
        landmarkCountBox.innerHTML = "-";

        gestureBox.classList.remove("unknown");

        readyToAppend = true;
        currentCandidate = null;
        stableCount = 0;

        statusBox.innerHTML = "Status: No hand detected. Ready for next sign.";
        updateAppendStateUI();
    }

    function processPrediction(data) {
        if (!data.hand_detected) {
            handleNoHandDetected();
            return;
        }

        let gesture = data.gesture;
        let rawGesture = data.raw_gesture;

        gestureBox.innerHTML = gesture;
        confidenceBox.innerHTML = "Confidence: " + data.confidence_percent + "%";
        rawGestureBox.innerHTML = "Raw: " + rawGesture;
        landmarkCountBox.innerHTML = data.landmark_count;
        thresholdBox.innerHTML = data.threshold_percent + "%";

        if (gesture === "Unknown") {
            gestureBox.classList.add("unknown");
            currentCandidate = null;
            stableCount = 0;
            updateAppendStateUI();
            return;
        }

        gestureBox.classList.remove("unknown");

        if (currentCandidate === gesture) {
            stableCount++;
        } else {
            currentCandidate = gesture;
            stableCount = 1;
        }

        if (stableCount >= requiredStableFrames) {
            appendGestureOnce(gesture);
        }

        statusBox.innerHTML = "Status: Prediction successful";
        updateAppendStateUI();
    }

    async function startCamera() {
        try {
            let stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: 640,
                    height: 480
                },
                audio: false
            });

            video.srcObject = stream;
            statusBox.innerHTML = "Status: Camera started";
        } catch (error) {
            statusBox.innerHTML = "Status: Camera error - " + error;
        }
    }

    async function predictOnce() {
        if (isPredicting) {
            return;
        }

        if (!video.videoWidth) {
            statusBox.innerHTML = "Status: Start camera first";
            return;
        }

        isPredicting = true;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        let ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(async function(blob) {
            let formData = new FormData();
            formData.append("image", blob, "frame.jpg");

            try {
                let response = await fetch("/api/vision/predict-static/", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": getCSRFToken()
                    },
                    body: formData
                });

                let data = await response.json();

                if (response.ok) {
                    processPrediction(data);
                } else {
                    statusBox.innerHTML = "Status: " + data.error;
                }
            } catch (error) {
                statusBox.innerHTML = "Status: Request failed - " + error;
            }

            isPredicting = false;
        }, "image/jpeg", 0.9);
    }

    function toggleLivePrediction() {
        live = !live;

        if (live) {
            liveTimer = setInterval(() => {
                predictOnce();
            }, 500);

            liveBtn.innerHTML = "Stop Live Prediction";
            liveBtn.classList.add("danger");
            statusBox.innerHTML = "Status: Live prediction started";
        } else {
            clearInterval(liveTimer);

            liveBtn.innerHTML = "Start Live Prediction";
            liveBtn.classList.remove("danger");
            statusBox.innerHTML = "Status: Live prediction stopped";
        }
    }

    updateSentenceUI();
    updateAppendStateUI();
</script>

</body>
</html>
